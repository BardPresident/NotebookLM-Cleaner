<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPUBLICKA · NotebookLM Cleaner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #f0e6d3;
    font-family: Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header p.sub {
    color: #a0856a;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    margin-top: 6px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: normal;
    letter-spacing: 0.1em;
    color: #f0c97a;
  }

  .container {
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  label {
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    color: #a0856a;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    height: 280px;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #f0e6d3;
    font-family: Georgia, serif;
    font-size: 0.95rem;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    transition: border-color 0.2s;
  }

  textarea:focus {
    outline: none;
    border-color: #f0c97a;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  button {
    padding: 12px 28px;
    border: none;
    border-radius: 4px;
    font-family: Georgia, serif;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.85; }

  #cleanBtn {
    background: #f0c97a;
    color: #0a0a0a;
    font-weight: bold;
  }

  #saveBtn {
    background: #1e1e1e;
    color: #7acc8f;
    border: 1px solid #7acc8f44;
  }

  #copyBtn {
    background: #1e1e1e;
    color: #f0e6d3;
    border: 1px solid #3a3a3a;
  }

  #clearBtn {
    background: #1e1e1e;
    color: #a0856a;
    border: 1px solid #2a2a2a;
  }

  .status {
    font-size: 0.8rem;
    color: #a0856a;
    letter-spacing: 0.08em;
    min-height: 1.2em;
    text-align: right;
  }

  .status.success { color: #7acc8f; }

  footer {
    margin-top: 60px;
    text-align: center;
    color: #3a3a3a;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
  }
</style>
</head>
<body>

<header>
  <h1>༺ NotebookLM Cleaner ༻</h1>
  <p class="sub">CC0 PUBLICKÁ DOMÁNIA · REPUBLICKA · ALL LOVE RESERVED</p>
</header>

<div class="container">

  <div>
    <label>Paste NotebookLM text here</label>
    <textarea id="input" placeholder="Paste your NotebookLM output here..."></textarea>
  </div>

  <div class="btn-row">
    <button id="cleanBtn" onclick="clean()">✦ Clean Text</button>
    <button id="saveBtn" onclick="saveAsTxt()">✦ Save as .txt</button>
    <button id="copyBtn" onclick="copyOut()">Copy Output</button>
    <button id="clearBtn" onclick="clearAll()">Clear All</button>
  </div>

  <div>
    <label>Clean output</label>
    <textarea id="output" placeholder="Your cleaned text will appear here..." readonly></textarea>
  </div>

  <div class="status" id="status"></div>

</div>

<footer>
  AMORIARIACKA · <a href="https://kkk.education" target="_blank" style="color:#3a3a3a;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#f0c97a'" onmouseout="this.style.color='#3a3a3a'">kkk.education</a>
</footer>

<script>
  function clean() {
    const raw = document.getElementById('input').value;
    if (!raw.trim()) {
      setStatus('Nothing to clean.', false);
      return;
    }

    let text = raw;

    // Fix: line break followed by punctuation that belongs on previous line
    text = text.replace(/\n[ \t]*([.,;:!?])/g, '$1');

    // Remove citation-style markers: [1], [2], [source], [Note 1], etc.
    text = text.replace(/\[\d+\]/g, '');
    text = text.replace(/\[[\w\s]+\]/g, '');

    // Ensure every paragraph is separated by exactly one blank line
    text = text.replace(/\n{2,}/g, '\n\n');
    text = text.replace(/([^\n])\n([^\n])/g, '$1\n\n$2');

    // Clean up any space before punctuation that crept in
    text = text.replace(/ ([.,;:!?])/g, '$1');

    document.getElementById('output').value = text.trim();
    setStatus('✦ Text cleaned successfully.', true);
  }

  function saveAsTxt() {
    const out = document.getElementById('output').value;
    if (!out.trim()) {
      setStatus('Clean the text first before saving.', false);
      return;
    }
    const filename = prompt('Save as:', 'notebooklm-export.txt');
    if (!filename) return;
    const blob = new Blob([out], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename.endsWith('.txt') ? filename : filename + '.txt';
    a.click();
    URL.revokeObjectURL(url);
    setStatus('✦ Saved as ' + a.download, true);
  }

  function copyOut() {
    const out = document.getElementById('output').value;
    if (!out.trim()) {
      setStatus('Nothing to copy yet.', false);
      return;
    }
    navigator.clipboard.writeText(out).then(() => {
      setStatus('✦ Copied to clipboard.', true);
    }).catch(() => {
      setStatus('Copy failed — please select and copy manually.', false);
    });
  }

  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
    setStatus('Cleared.', false);
  }

  function setStatus(msg, success) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (success ? ' success' : '');
  }
</script>

</body>
</html>
